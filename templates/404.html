	<style>
		.intro h1:before {
			/* Edit this with your name or anything else */
			content: 'SOFI';
		}

		.error-mail-link {
			display: inline-flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: 0.3rem;
			margin-top: 0.75rem;
			color: #999;
			text-decoration: none;
		}

		.error-mail-link:hover {
			color: #333;
		}

		.error-mail-link svg {
			width: 1.6em;
			height: 1.6em;
			fill: currentColor;
		}

		.error-mail-label {
			display: block;
			font-size: 0.95rem;
			line-height: 1.1;
		}

		.error-helper-text {
			font-size: 0.95rem;
			line-height: 1.1;
			color: #999;
			margin-bottom: 0.2rem;
		}

		.error-message {
			font-size: 1.1rem;
			line-height: 1.4;
			max-width: 34rem;
			margin: 0 auto 0.75rem;
		}

		.error-code {
			font-size: clamp(4.5rem, 10vw, 6rem);
			line-height: 1;
			margin-bottom: 0.25rem;
		}
	</style>
</head>

<body>
	<!-- Navigation -->
	<div class="main-nav">
		<div class="container">
			<header class="group top-nav">
				<div class="navigation-toggle" data-tools="navigation-toggle" data-target="#navbar-1">

				</div>

						<li class="active"><a href="index.html">Inicio</a></li>
					</ul>

			</header>
		</div>
	</div>

	<div>
		<br><br><br><br><br><br><br>
	</div>

	<div class="text-center">
		<ol class="container">
			<h1 class="error-code">{{ error_code }}</h1>
			<h2 class="error-message">{{ message }}</h2>
			<p class="error-helper-text">Si el formulario falla, usa el correo electrónico.</p>
			<p>
				<a href="mailto:{{ fallback_email }}" class="error-mail-link" aria-label="Enviar correo ahora" title="Enviar correo ahora">
					<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
						<path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v.217L8 8.583.001 4.217V4z"></path>
						<path d="M0 5.383V12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V5.383l-7.4 4.933a1 1 0 0 1-1.2 0L0 5.383z"></path>
					</svg>
					<span class="error-mail-label">Enviar correo ahora</span>
				</a>
			</p>
			<a href="index.html">Volver al inicio</a></li>
		</ol>
